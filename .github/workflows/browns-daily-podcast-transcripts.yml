name: Browns Audio Podcast Transcript Feed

on:
  workflow_dispatch:
  schedule:
    # 6:15 PM America/New_York during daylight saving time.
    # GitHub Actions cron runs in UTC. Adjust to 23:15 UTC during standard time if exact winter timing matters.
    - cron: "15 22 * * 1-5"

permissions:
  contents: read

jobs:
  update-podcast-transcript-feed:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-podcast-transcripts.txt

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-podcast-transcripts.txt

      - name: Update Browns audio podcast Google Doc
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DOC_ID: ${{ secrets.GOOGLE_DOC_ID }}
          PODCAST_SPECS: "452827225::Cleveland Browns Podcast Network::Cleveland Browns Daily,Browns Daily|1033244883::The Ken Carman Show with Anthony Lima::"
          MAX_EPISODES_PER_PODCAST: "1"
          WHISPER_MODEL_SIZE: "tiny"
        run: python scripts/update_browns_daily_podcast_doc.py
